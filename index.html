<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘思涛 · 个人主页</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #ffb6c1;
    --card: #ffffff;
    --text: #4a3728;
    --text-secondary: #7a6a5c;
    --accent: #07c160;
    --accent-hover: #06ad56;
    --border: #e8d9cc;
    --shadow: 0 2px 16px rgba(74, 55, 40, 0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #ffb6c1;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ---- 头像 ---- */
  .avatar-wrapper { margin-top: 20px; }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 4px 20px rgba(74, 55, 40, 0.12);
    background: linear-gradient(135deg, #f0e2d3 0%, #e8d5c0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: #c17f59;
    user-select: none;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .avatar:hover { transform: scale(1.05); }

  /* ---- 名字 ---- */
  .name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }

  /* ---- 简介 ---- */
  .bio {
    font-size: 15px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.7;
    max-width: 360px;
    margin-top: -10px;
  }

  /* ---- 链接列表 ---- */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
    transition: all 0.25s ease;
    box-shadow: var(--shadow);
    cursor: pointer;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(74, 55, 40, 0.14);
    border-color: var(--accent);
  }

  .link-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .icon-wechat   { background: #d4f5e2; }

  .link-label {
    display: flex;
    flex-direction: column;
  }

  .link-label small {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .arrow {
    margin-left: auto;
    color: #c4b5a5;
    font-size: 18px;
  }

  /* ---- 微信弹出层 ---- */
  .wechat-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .wechat-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .wechat-modal {
    background: #fff;
    border-radius: 20px;
    padding: 36px 28px 28px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(20px);
    transition: transform 0.3s ease;
  }

  .wechat-overlay.active .wechat-modal {
    transform: translateY(0);
  }

  .wechat-modal h3 {
    font-size: 20px;
    margin-bottom: 6px;
    color: #333;
  }

  .wechat-modal .sub {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
  }

  .qr-wrapper {
    width: 200px;
    height: 200px;
    margin: 0 auto 16px;
    border: 2px dashed #e0e0e0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fafafa;
  }

  .qr-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .qr-placeholder {
    color: #ccc;
    font-size: 14px;
    line-height: 1.6;
  }

  .btn-open-wechat {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
  }

  .btn-open-wechat:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(7, 193, 96, 0.3);
  }

  .btn-close-modal {
    margin-top: 14px;
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-close-modal:hover { color: #666; }

  /* ---- 底部 ---- */
  .footer {
    font-size: 13px;
    color: #b8a898;
    margin-top: 8px;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* ---- 入场动画 ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate {
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
  }

  .animate:nth-child(1) { animation-delay: 0.00s; }
  .animate:nth-child(2) { animation-delay: 0.08s; }
  .animate:nth-child(3) { animation-delay: 0.16s; }
  .animate:nth-child(4) { animation-delay: 0.24s; }
  .animate:nth-child(5) { animation-delay: 0.32s; }
  .animate:nth-child(6) { animation-delay: 0.40s; }

  /* ---- 五子棋游戏 ---- */
  .gomoku-card { width: 100%; position: relative; overflow: hidden; border-radius: var(--radius); min-height: 380px; }
  .gomoku-screen { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
  .gm-bg-deco { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .gm-star { position: absolute; font-size: 22px; animation: starFloat 3s ease-in-out infinite; opacity: 0.6; }
  .gm-star.s1 { top: 10%; left: 8%; animation-delay: 0s; }
  .gm-star.s2 { top: 15%; right: 10%; animation-delay: 1s; }
  .gm-star.s3 { bottom: 18%; left: 12%; animation-delay: 0.5s; }
  .gm-star.s4 { bottom: 10%; right: 8%; animation-delay: 2s; }
  @keyframes starFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(15deg); } }
  #gmLobby { background: linear-gradient(135deg, #fff9e6 0%, #fff0f5 30%, #f0f0ff 60%, #e8f8f0 100%); border-radius: var(--radius); position: relative; min-height: 320px; justify-content: center; gap: 18px; }
  .gm-title { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ffa94d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 4px; z-index: 1; animation: titlePulse 2s ease-in-out infinite; }
  @keyframes titlePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .gm-subtitle { font-size: 14px; color: #999; margin-top: -10px; z-index: 1; }
  .gm-lobby-btns { display: flex; gap: 14px; z-index: 1; flex-wrap: wrap; justify-content: center; }
  .gm-btn { border: none; padding: 13px 32px; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.25s ease; letter-spacing: 1px; }
  .gm-btn-create { background: linear-gradient(135deg, #ff6b6b, #ff8787); color: #fff; box-shadow: 0 4px 14px rgba(255,107,107,0.3); }
  .gm-btn-create:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
  .gm-btn-join { background: linear-gradient(135deg, #74c0fc, #4dabf7); color: #fff; box-shadow: 0 4px 14px rgba(77,171,247,0.3); }
  .gm-btn-join:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(77,171,247,0.4); }
  .gm-btn-go { background: #69db7c; color: #fff; padding: 10px 20px; font-size: 14px; }
  .gm-join-box { display: flex; gap: 8px; z-index: 1; }
  .gm-input { padding: 10px 16px; border-radius: 50px; border: 2px solid #e0e0e0; font-size: 14px; font-family: inherit; width: 160px; outline: none; }
  .gm-input:focus { border-color: #74c0fc; }
  .gm-copyright { font-size: 11px; color: #bbb; z-index: 1; margin-top: 4px; }
  #gmRoom { background: #fff; border-radius: var(--radius); gap: 16px; }
  .gm-room-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .gm-room-badge { font-size: 15px; color: #555; background: #f8f9fa; padding: 6px 14px; border-radius: 20px; }
  .gm-btn-sm { border: none; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .gm-btn-copy { background: #e7f5ff; color: #228be6; }
  .gm-invite-wrap { position: relative; display: inline-block; }
  .gm-invite-popup { position: absolute; top: 110%; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.15); padding: 6px 0; min-width: 200px; z-index: 100; animation: gmFadeIn 0.2s ease; }
  @keyframes gmFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .gm-invite-opt { display: block; width: 100%; border: none; background: transparent; padding: 10px 18px; font-size: 14px; text-align: left; cursor: pointer; color: #333; font-family: inherit; transition: background 0.15s; }
  .gm-invite-opt:hover { background: #f5f5f5; }
  .gm-invite-opt:first-child { border-bottom: 1px solid #f0f0f0; }
  .gm-players { display: flex; align-items: center; gap: 20px; }
  .gm-player-card { text-align: center; min-width: 80px; }
  .gm-player-icon { font-size: 36px; }
  .gm-player-name { font-size: 14px; font-weight: 600; color: #333; }
  .gm-player-status { font-size: 12px; color: #999; margin-top: 2px; }
  .gm-vs { font-size: 18px; font-weight: 900; color: #ddd; }
  .gm-btn-ready { background: linear-gradient(135deg, #69db7c, #51cf66); color: #fff; box-shadow: 0 4px 14px rgba(105,219,124,0.3); }
  .gm-btn-leave { background: #f1f3f5; color: #888; padding: 10px 24px; font-size: 14px; }
  .gm-conn-status { font-size: 12px; color: #adb5bd; }
  #gmGame { background: #f8f9fa; border-radius: var(--radius); gap: 10px; padding: 12px; }
  .gm-game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; }
  .gm-turn-info { font-size: 15px; font-weight: 700; color: #333; }
  .gm-timer { font-size: 14px; color: #888; font-variant-numeric: tabular-nums; }
  #gmCanvas { border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; touch-action: none; max-width: 100%; }
  .gm-game-msg { font-size: 12px; color: #f08c00; min-height: 18px; text-align: center; }
  .gm-game-actions { display: flex; gap: 12px; }
  .gm-btn-undo { background: #fff3bf; color: #e67700; }
  .gm-btn-resign { background: #ffe3e3; color: #e03131; }
  .gm-btn-undo:disabled { opacity: 0.4; cursor: not-allowed; }
  #gmOver { position: absolute; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; border-radius: var(--radius); z-index: 5; }
  .gm-over-box { background: #fff; border-radius: 18px; padding: 28px 32px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
  .gm-over-box h3 { font-size: 22px; margin-bottom: 8px; }
  .gm-over-score { font-size: 14px; color: #888; margin-bottom: 16px; }
  .gm-over-btns { display: flex; gap: 10px; justify-content: center; }
  .gm-btn-rematch { background: linear-gradient(135deg, #ffa94d, #ff922b); color: #fff; padding: 10px 24px; font-size: 14px; }
  .gm-btn-quit { background: #f1f3f5; color: #888; padding: 10px 24px; font-size: 14px; }
  .gm-room-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .gm-history { width: 100%; padding: 0 16px 12px; text-align: center; background: #fff; border-radius: 0 0 var(--radius) var(--radius); }
  .gm-history summary { font-size: 13px; color: #888; cursor: pointer; padding: 8px; }
  .gm-history-list { font-size: 12px; color: #aaa; max-height: 120px; overflow-y: auto; text-align: left; }
  .gm-history-item { padding: 4px 8px; border-bottom: 1px solid #f5f5f5; }

  /* ---- 跳一跳游戏 ---- */
  .game-wrapper {
    width: 100%;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    min-height: 420px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* 开始画面 */
  .game-start {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 10;
    background: #ffffff;
    opacity: 1;
    border-radius: var(--radius);
  }

  .game-title-wrapper {
    text-align: center;
  }

  .game-title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #333;
  }

  .game-title span {
    display: inline-block;
    animation: titleBounce 1.2s ease-in-out infinite;
  }
  .game-title span:nth-child(1) { animation-delay: 0.0s; color: #ff6b6b; }
  .game-title span:nth-child(2) { animation-delay: 0.2s; color: #ffa94d; }
  .game-title span:nth-child(3) { animation-delay: 0.4s; color: #69db7c; }

  @keyframes titleBounce {
    0%, 100% { transform: translateY(0); }
    30%  { transform: translateY(-18px); }
    50%  { transform: translateY(0); }
  }

  .game-author {
    font-size: 15px;
    color: #666;
    margin-top: 8px;
  }

  .game-copyright {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
  }

  .btn-start {
    background: linear-gradient(135deg, #ff6b6b, #ffa94d);
    color: #fff;
    border: none;
    padding: 12px 48px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    font-family: inherit;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
  }

  .btn-start:active {
    transform: scale(0.96);
  }

  .game-hint {
    font-size: 13px;
    color: #bbb;
  }

  /* 得分 */
  .game-score {
    display: none;
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 3;
    pointer-events: none;
  }

  /* 游戏结束覆盖层 */
  .game-over {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center;
    justify-content: center;
    z-index: 4;
    border-radius: var(--radius);
  }

  .game-over-box {
    background: #fff;
    border-radius: 20px;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  }

  .game-over-box h3 {
    font-size: 24px;
    color: #333;
    margin-bottom: 12px;
  }

  .final-score {
    font-size: 18px;
    color: #666;
    margin-bottom: 4px;
  }

  .best-score {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 18px;
  }

  /* ---- 响应式 ---- */
  @media (max-width: 480px) {
    body { padding: 24px 16px; }
    .name { font-size: 24px; }
    .avatar { width: 90px; height: 90px; font-size: 38px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- 头像 -->
  <div class="avatar-wrapper animate">
    <div class="avatar" id="avatar" title="点击更换照片">
      <img src="avatar.jpg" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
    </div>
  </div>

  <!-- 名字 -->
  <h1 class="name animate">刘思涛</h1>

  <!-- 个人简介 -->
  <p class="bio animate">
    欢迎使用网页小游戏
  </p>

  <!-- ========== 五子棋游戏 ========== -->
  <div class="game-wrapper animate" id="gomokuWrapper">
    <div class="gomoku-card">
      <div class="gomoku-screen" id="gmLobby">
        <div class="gm-bg-deco"><span class="gm-star s1">&#x2B50;</span><span class="gm-star s2">&#x2B50;</span><span class="gm-star s3">&#x2728;</span><span class="gm-star s4">&#x2B50;</span></div>
        <h2 class="gm-title">&#x1F525; 激情五子棋</h2>
        <p class="gm-subtitle">双人在线对战</p>
        <div class="gm-lobby-btns">
          <button class="gm-btn gm-btn-create" id="btnCreateRoom">&#x1F3E0; 创建房间</button>
          <button class="gm-btn gm-btn-join" id="btnShowJoin">&#x1F50D; 加入房间</button>
        </div>
        <div class="gm-join-box" id="joinBox" style="display:none;">
          <input class="gm-input" id="inputRoomId" placeholder="输入房间号" maxlength="20">
          <button class="gm-btn gm-btn-go" id="btnJoinRoom">进入</button>
        </div>
        <p class="gm-copyright">游戏版权及解释权归刘思涛所有</p>
      </div>
      <div class="gomoku-screen" id="gmRoom" style="display:none;">
        <div class="gm-room-header">
          <span class="gm-room-badge">&#x1F3E0; 房间号：<strong id="roomIdText">---</strong></span>
          <div class="gm-invite-wrap" id="inviteWrap">
            <button class="gm-btn-sm gm-btn-copy" id="btnInvite">&#x1F4E8; 邀请</button>
            <div class="gm-invite-popup" id="invitePopup" style="display:none;">
              <button class="gm-invite-opt" id="btnInviteWechat">&#x1F4AC; 发送给微信好友</button>
              <button class="gm-invite-opt" id="btnInviteCopy">&#x1F4CB; 复制链接</button>
            </div>
          </div>
        </div>
        <div class="gm-players">
          <div class="gm-player-card" id="playerSelf"><div class="gm-player-icon">&#x1F600;</div><div class="gm-player-name">我</div><div class="gm-player-status" id="selfStatus">未准备</div></div>
          <div class="gm-vs">VS</div>
          <div class="gm-player-card" id="playerOpp"><div class="gm-player-icon">&#x231B;</div><div class="gm-player-name">等待对手...</div><div class="gm-player-status" id="oppStatus">---</div></div>
        </div>
        <div class="gm-room-actions">
          <button class="gm-btn gm-btn-ready" id="btnReady">&#x2705; 准备</button>
          <button class="gm-btn gm-btn-leave" id="btnLeaveRoom">&#x1F6AA; 退出房间</button>
        </div>
        <div class="gm-conn-status" id="connStatus">等待对手加入...</div>
      </div>
      <div class="gomoku-screen" id="gmGame" style="display:none;">
        <div class="gm-game-header"><div class="gm-turn-info" id="turnInfo">&#x26AB; 黑方回合</div><div class="gm-timer" id="gameTimer">00:00</div></div>
        <canvas id="gmCanvas"></canvas>
        <div class="gm-game-msg" id="gmGameMsg"></div>
        <div class="gm-game-actions"><button class="gm-btn-sm gm-btn-undo" id="btnUndo">&#x21A9; 悔棋</button><button class="gm-btn-sm gm-btn-resign" id="btnResign">&#x1F3F3; 认输</button></div>
      </div>
      <div class="gomoku-screen" id="gmOver" style="display:none;">
        <div class="gm-over-box"><h3 id="gmResultText">---</h3><p class="gm-over-score" id="gmScoreText"></p>
          <div class="gm-over-btns"><button class="gm-btn gm-btn-rematch" id="btnRematch">&#x1F504; 再来一局</button><button class="gm-btn gm-btn-quit" id="btnQuitGame">&#x1F6AA; 退出</button></div></div>
      </div>
      <div class="gm-history" id="gmHistory"><details><summary>&#x1F4CA; 历史比分记录</summary><div class="gm-history-list" id="historyList">暂无记录</div></details></div>
    </div>
  </div>

  <!-- ========== 跳一跳游戏 ========== -->

<script>
// ---- 设备检测 ----
function getDeviceType() {
  const ua = navigator.userAgent;
  const isMobile = /Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  const isTablet = /iPad|Android(?!.*Mobile)/i.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  if (isTablet) return 'tablet';
  if (isMobile) return 'mobile';
  return 'desktop';
}

// ---- 头像更换 ----
const avatar = document.getElementById('avatar');
avatar.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        avatar.style.background = 'none';
        avatar.innerHTML = '';
        const img = document.createElement('img');
        img.src = event.target.result;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.borderRadius = '50%';
        img.style.objectFit = 'cover';
        avatar.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
  };
  input.click();
});

// ---- 微信弹窗 ----
const overlay = document.getElementById('wechatOverlay');
const btnWechat = document.getElementById('btnWechat');
const btnClose = document.getElementById('btnCloseModal');
const btnDesktop = document.getElementById('btnOpenWechatDesktop');
const btnMobile = document.getElementById('btnOpenWechatMobile');
const mobileActions = document.getElementById('mobileActions');
const wechatTitle = document.getElementById('wechatTitle');
const wechatSub = document.getElementById('wechatSub');
const deviceType = getDeviceType();

btnWechat.addEventListener('click', () => {
  // 根据设备显示不同内容
  if (deviceType === 'desktop') {
    btnDesktop.style.display = 'inline-flex';
    mobileActions.style.display = 'none';
    wechatTitle.textContent = '添加微信好友';
    wechatSub.textContent = '使用手机微信扫描二维码，或打开电脑微信';
  } else {
    // 手机或平板
    btnDesktop.style.display = 'none';
    mobileActions.style.display = 'block';
    wechatTitle.textContent = '添加微信好友';
    wechatSub.textContent = '点击下方按钮打开微信，或保存二维码扫码';
  }
  overlay.classList.add('active');
});

btnClose.addEventListener('click', () => {
  overlay.classList.remove('active');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('active');
});

// ---- 打开微信（通用函数）----
function tryOpenWechat(scheme) {
  const start = Date.now();

  // 使用 iframe 方式（对移动端更友好，避免跳转失败后页面空白）
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = scheme;
  document.body.appendChild(iframe);

  setTimeout(() => {
    document.body.removeChild(iframe);
    // 如果 1.2 秒后还在当前页，说明唤起失败
    if (Date.now() - start < 1500 && document.hidden === false) {
      alert('未能自动打开微信。\n请使用手机微信扫描二维码添加好友。');
    }
  }, 1200);
}

// 桌面端：打开电脑微信
btnDesktop.addEventListener('click', () => {
  tryOpenWechat('weixin://');
});

// 移动端：打开微信App
btnMobile.addEventListener('click', () => {
  // 移动端优先使用微信扫一扫 scheme
  tryOpenWechat('weixin://dl/scan');
});

// ---- ESC 关闭弹窗 ----
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') overlay.classList.remove('active');
});
</script>

<script>
// ==================== 跳一跳游戏 ====================
(function() {
  const canvasContainer = document.getElementById('canvasContainer');
  const wrapper = document.getElementById('gameWrapper');
  const startScreen = document.getElementById('gameStart');
  const gameOverScreen = document.getElementById('gameOver');
  const scoreDisplay = document.getElementById('gameScore');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');

  const W = 400;
  const H = 420;
  const ISO_ANGLE = Math.PI / 6;
  const MAX_POWER = 100;
  const CHARGE_SPEED = 55;
  const POWER_TO_DIST = 3.5;

  let canvas = null;
  let ctx = null;
  let blocks = [];
  let currentIdx = 0;
  let player = { x: 0, y: 0, z: 0 };
  let camera = { x: 0, y: 0 };
  let score = 0;
  let bestScore = 0;
  let gameState = 'idle'; // idle | charging | jumping | falling | over
  let chargePower = 0;
  let jumpFrom = null;
  let jumpTarget = null;
  let jumpT = 0;
  let jumpDuration = 0;
  let landedOnBlock = null;
  let particles = [];
  let animId = null;
  let perfectText = null; // "完美"文字动画

  try {
    bestScore = parseInt(localStorage.getItem('jump_best')) || 0;
    bestScoreEl.textContent = bestScore;
  } catch(e) {}

  function resize() {
    const rect = wrapper.getBoundingClientRect();
    const w = Math.min(rect.width, 480);
    canvas.width = w * 2;
    canvas.height = 420 * 2;
    canvas.style.width = w + 'px';
    canvas.style.height = '420px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(2, 2);
  }

  function isoX(wx, wy) {
    return (wx - wy) * Math.cos(ISO_ANGLE) + W/2 + camera.x;
  }
  function isoY(wx, wy, z) {
    return (wx + wy) * Math.sin(ISO_ANGLE) + H/2 + 70 + camera.y - z;
  }

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1,3), 16),
      g: parseInt(hex.slice(3,5), 16),
      b: parseInt(hex.slice(5,7), 16)
    };
  }

  function brighten(hex, a) {
    let {r,g,b} = hexToRgb(hex);
    r = Math.min(255, r + Math.floor((255-r)*a));
    g = Math.min(255, g + Math.floor((255-g)*a));
    b = Math.min(255, b + Math.floor((255-b)*a));
    return `rgb(${r},${g},${b})`;
  }

  function darken(hex, a) {
    let {r,g,b} = hexToRgb(hex);
    r = Math.floor(r * (1 - a));
    g = Math.floor(g * (1 - a));
    b = Math.floor(b * (1 - a));
    return `rgb(${r},${g},${b})`;
  }

  function drawTopFace(cx, cy, w, d, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + w, cy + w * 0.577);
    ctx.lineTo(cx, cy + w * 1.155);
    ctx.lineTo(cx - w, cy + w * 0.577);
    ctx.closePath();
    ctx.fill();
  }

  function drawRightFace(cx, cy, w, h, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + w, cy + w * 0.577);
    ctx.lineTo(cx + w, cy + w * 0.577 + h);
    ctx.lineTo(cx, cy + h);
    ctx.closePath();
    ctx.fill();
  }

  function drawLeftFace(cx, cy, w, h, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy + h);
    ctx.lineTo(cx - w, cy + w * 0.577 + h);
    ctx.lineTo(cx - w, cy + w * 0.577);
    ctx.closePath();
    ctx.fill();
  }

  function drawBlock(b) {
    const topCX = isoX(b.x, b.y);
    const topCY = isoY(b.x, b.y, b.h);
    const halfW = b.w / 2;
    const halfD = b.d / 2;

    drawTopFace(topCX, topCY, halfW, halfD, brighten(b.color, 0.15));
    drawRightFace(topCX, topCY + halfW * 0.577, halfD, b.h, darken(b.color, 0.15));
    drawLeftFace(topCX, topCY + halfW * 0.577, halfD, b.h, darken(b.color, 0.35));
  }

  const blockColors = ['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff','#e8d5b0','#d4c4f0','#f0c4d4','#ffd4a8','#b8e8d0'];

  function initBlocks() {
    blocks = [{
      x: 0, y: 0, w: 70, d: 70, h: 55,
      color: blockColors[Math.floor(Math.random() * blockColors.length)]
    }];
    for (let i = 0; i < 4; i++) addBlock();
  }

  function addBlock() {
    const last = blocks[blocks.length - 1];
    const dir = Math.random() < 0.5 ? 1 : -1;
    const dist = 100 + Math.random() * 170;
    const axis = Math.random() < 0.55 ? 'x' : 'y';
    const nw = 30 + Math.random() * 60;
    const nd = 30 + Math.random() * 60;

    let nx = last.x, ny = last.y;
    if (axis === 'x') nx += dir * dist;
    else ny += dir * dist;

    // 确保新方块不和老方块重叠
    let overlap = false;
    for (let i = Math.max(0, blocks.length - 3); i < blocks.length; i++) {
      const b = blocks[i];
      if (Math.abs(nx - b.x) < 60 && Math.abs(ny - b.y) < 60) { overlap = true; break; }
    }
    if (overlap) { nx += dir * 60; ny += dir * 30; }

    blocks.push({
      x: nx, y: ny,
      w: nw, d: nd,
      h: 35 + Math.random() * 45,
      color: blockColors[Math.floor(Math.random() * blockColors.length)]
    });
  }

  function resetGame() {
    initBlocks();
    currentIdx = 0;
    player = { x: blocks[0].x, y: blocks[0].y, z: blocks[0].h };
    score = 0;
    scoreDisplay.textContent = '0';
    camera.x = 0;
    camera.y = 0;
    chargePower = 0;
    gameState = 'idle';
    particles = [];
    perfectText = null;
    landedOnBlock = null;
  }

  function drawPlayer() {
    const px = isoX(player.x, player.y);
    const py = isoY(player.x, player.y, player.z);
    const squish = gameState === 'charging' ? Math.max(0.45, 1 - chargePower / 160) : 1;
    const w = 18;
    const h = 28 * squish;
    const bodyW = w * (2 - squish);

    ctx.save();
    ctx.translate(px, py);

    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bodyW * 0.55, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // 身体
    const grad = ctx.createLinearGradient(0, -h/2, 0, h/2);
    grad.addColorStop(0, '#5c5c5c');
    grad.addColorStop(1, '#2a2a2a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW/2, h/2, 0, 0, Math.PI * 2);
    ctx.fill();

    // 头部
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(0, -h/2 - 1, bodyW * 0.48, 0, Math.PI * 2);
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3, -h/2 - 3, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3, -h/2 - 3, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-3, -h/2 - 4, 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3, -h/2 - 4, 1.8, 0, Math.PI * 2);
    ctx.fill();

    // 名字
    ctx.fillStyle = '#333';
    ctx.font = 'bold 10px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('刘思涛', 0, -h/2 - 13);

    ctx.restore();
  }

  function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 5,
        vy: -(Math.random() * 5 + 1),
        life: 1,
        size: 1.5 + Math.random() * 3,
        color: color || { r: 255, g: 200, b: 60 }
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= 0.025;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${p.life})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function updateCamera() {
    const b = blocks[currentIdx];
    const tx = -isoX(b.x, b.y) + W / 2;
    const ty = -(isoY(b.x, b.y, 0) - H / 2 - 70);
    camera.x += (tx - camera.x) * 0.07;
    camera.y += (ty - camera.y) * 0.07;
  }

  function render() {
    if (!ctx || !canvas) return;
    ctx.clearRect(0, 0, W, H);

    // 背景
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#f0f4f8');
    bg.addColorStop(0.6, '#dce8f0');
    bg.addColorStop(1, '#c8dae8');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 网格
    ctx.strokeStyle = 'rgba(0,0,0,0.025)';
    ctx.lineWidth = 0.5;
    for (let i = -300; i < 300; i += 30) {
      ctx.beginPath();
      ctx.moveTo(isoX(i, -300), isoY(i, -300, 0));
      ctx.lineTo(isoX(i, 300), isoY(i, 300, 0));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(isoX(-300, i), isoY(-300, i, 0));
      ctx.lineTo(isoX(300, i), isoY(300, i, 0));
      ctx.stroke();
    }

    // 方块
    blocks.forEach((b, i) => {
      drawBlock(b);
      // 下一个目标方块高亮
      if (i === currentIdx + 1 && gameState === 'idle') {
        const cx = isoX(b.x, b.y);
        const cy = isoY(b.x, b.y, b.h);
        const alpha = 0.15 + Math.sin(Date.now() / 250) * 0.1;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        drawTopFace(cx, cy, b.w / 2, b.d / 2, '#fff');

        // 中心点
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(cx, cy + b.w * 0.577 / 2, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    drawParticles();
    drawPlayer();

    // "完美"文字
    if (perfectText) {
      perfectText.life -= 0.02;
      if (perfectText.life > 0) {
        const alpha = perfectText.life;
        const yOff = (1 - perfectText.life) * -40;
        ctx.fillStyle = `rgba(255,180,60,${alpha})`;
        ctx.font = 'bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('完美!', perfectText.x, perfectText.y + yOff);
        ctx.fillStyle = `rgba(255,180,60,${alpha * 0.3})`;
        ctx.font = 'bold 24px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillText('完美!', perfectText.x, perfectText.y + yOff + 1);
      } else {
        perfectText = null;
      }
    }

    // 蓄力条
    if (gameState === 'charging') {
      const b = blocks[currentIdx];
      const bx = isoX(b.x, b.y);
      const by = isoY(b.x, b.y, b.h);
      const pct = Math.min(chargePower / MAX_POWER, 1);

      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.roundRect(bx - 32, by - 48, 64, 8, 4);
      ctx.fill();

      const barGrad = ctx.createLinearGradient(bx - 32, 0, bx + 32, 0);
      barGrad.addColorStop(0, '#4ecb71');
      barGrad.addColorStop(0.45, '#ffd43b');
      barGrad.addColorStop(1, '#ff6b6b');
      ctx.fillStyle = barGrad;
      ctx.beginPath();
      ctx.roundRect(bx - 31, by - 47, 62 * pct, 6, 3);
      ctx.fill();

      ctx.fillStyle = '#555';
      ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('按住蓄力中...', bx, by - 56);
    }
  }

  function startJump() {
    if (gameState !== 'charging') return;
    const nextIdx = currentIdx + 1;
    if (nextIdx >= blocks.length) return;

    const targetBlock = blocks[nextIdx];
    const dirX = targetBlock.x - player.x;
    const dirY = targetBlock.y - player.y;
    const len = Math.hypot(dirX, dirY);
    if (len < 1) return;
    const nx = dirX / len;
    const ny = dirY / len;

    // 跳跃距离 = 充能值 × 系数
    const jumpDist = chargePower * POWER_TO_DIST;

    gameState = 'jumping';
    jumpFrom = { x: player.x, y: player.y, z: player.z };
    jumpTarget = {
      x: player.x + nx * jumpDist,
      y: player.y + ny * jumpDist,
      z: targetBlock.h
    };
    jumpT = 0;
    jumpDuration = Math.max(0.32, Math.min(0.55, jumpDist / 500));
    chargePower = 0;
  }

  function updateJump(dt) {
    jumpT += dt;
    const t = jumpT / jumpDuration;

    if (t >= 1) {
      // 落地检测：检查是否落在某个方块上
      const lx = jumpTarget.x;
      const ly = jumpTarget.y;
      let landed = false;
      let perfect = false;
      let landedBlockIdx = -1;

      for (let i = currentIdx; i < blocks.length; i++) {
        const b = blocks[i];
        const halfW = b.w / 2;
        const halfD = b.d / 2;
        if (Math.abs(lx - b.x) < halfW && Math.abs(ly - b.y) < halfD) {
          landed = true;
          landedBlockIdx = i;

          // 落点距离中心 < 8 为完美
          const centerDist = Math.hypot(lx - b.x, ly - b.y);
          if (centerDist < 8) perfect = true;
          break;
        }
      }

      if (landed) {
        const b = blocks[landedBlockIdx];
        player.x = b.x;
        player.y = b.y;
        player.z = b.h;
        currentIdx = landedBlockIdx;
        score++;
        scoreDisplay.textContent = score;
        gameState = 'idle';

        const spx = isoX(b.x, b.y);
        const spy = isoY(b.x, b.y, b.h);

        if (perfect) {
          spawnParticles(spx, spy, 20, { r: 255, g: 215, b: 0 });
          perfectText = { x: spx, y: spy - 20, life: 1 };
          score++;
          scoreDisplay.textContent = score;
        } else {
          spawnParticles(spx, spy, 8, { r: 255, g: 200, b: 60 });
        }

        while (blocks.length - currentIdx < 4) addBlock();
        while (currentIdx > 2 && blocks.length > 5) {
          blocks.shift();
          currentIdx--;
        }
      } else {
        gameState = 'falling';
        player.x = lx;
        player.y = ly;
        player.z = jumpTarget.z;
        fallT = 0;
      }
      return;
    }

    const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    player.x = jumpFrom.x + (jumpTarget.x - jumpFrom.x) * easeT;
    player.y = jumpFrom.y + (jumpTarget.y - jumpFrom.y) * easeT;

    const dist = Math.hypot(jumpTarget.x - jumpFrom.x, jumpTarget.y - jumpFrom.y);
    const maxH = Math.max(70, dist * 0.55);
    player.z = jumpFrom.z + 4 * maxH * t * (1 - t);
  }

  let fallT = 0;
  function updateFall(dt) {
    fallT += dt;
    player.z -= 550 * dt;
    if (player.z < -250) gameOver();
  }

  function gameOver() {
    gameState = 'over';
    gameOverScreen.style.display = 'flex';
    finalScoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('jump_best', bestScore); } catch(e) {}
    }
    bestScoreEl.textContent = bestScore;
    scoreDisplay.style.display = 'none';
  }

  let lastTime = 0;
  let loopRunning = false;

  function loop(now) {
    if (!loopRunning) return;
    animId = requestAnimationFrame(loop);
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    updateParticles();
    updateCamera();

    if (gameState === 'charging') {
      chargePower += CHARGE_SPEED * dt;
      if (chargePower > MAX_POWER) chargePower = MAX_POWER;
    }
    if (gameState === 'jumping') updateJump(dt);
    if (gameState === 'falling') updateFall(dt);

    render();
  }

  function startLoop() {
    if (loopRunning) return;
    loopRunning = true;
    lastTime = performance.now();
    animId = requestAnimationFrame(loop);
  }

  function onDown(e) {
    if (gameState !== 'idle') return;
    e.preventDefault();
    gameState = 'charging';
    chargePower = 0;
  }

  function onUp(e) {
    if (gameState !== 'charging') return;
    e.preventDefault();
    startJump();
  }

  function bindCanvasEvents() {
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchend', onUp, { passive: false });
    canvas.addEventListener('touchcancel', onUp, { passive: false });
  }

  function startGame() {
    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.id = 'gameCanvas';
      canvas.style.cssText = 'display:block;width:100%;height:420px;border-radius:16px;cursor:pointer;touch-action:none;';
      canvasContainer.appendChild(canvas);
      ctx = canvas.getContext('2d');
      bindCanvasEvents();
    }
    canvasContainer.style.display = 'block';
    canvas.style.display = 'block';
    startScreen.style.display = 'none';
    gameOverScreen.style.display = 'none';
    scoreDisplay.style.display = 'block';
    scoreDisplay.textContent = '0';
    resize();
    resetGame();
    startLoop();
  }

  function restartGame() {
    gameOverScreen.style.display = 'none';
    scoreDisplay.style.display = 'block';
    scoreDisplay.textContent = '0';
    resetGame();
  }

  window.addEventListener('resize', () => {
    if (loopRunning && canvas) resize();
  });

  document.getElementById('btnStart').addEventListener('click', startGame);
  document.getElementById('btnRestart').addEventListener('click', restartGame);

  initBlocks();
})();
</script>

<script>
// ==================== 五子棋双人对战 ====================
(function() {
  const BOARD_SIZE = 15;
  const CELL = 26;
  const gmCanvas = document.getElementById('gmCanvas');
  const ctx = gmCanvas.getContext('2d');

  let peer = null;
  let conn = null;
  let roomId = '';
  let isHost = false;
  let isReady = false;
  let oppReady = false;
  let board = [];
  let myColor = 0;
  let currentTurn = 1;
  let gameActive = false;
  let moveHistory = [];
  let gameStartTime = 0;
  let timerInterval = null;
  let pendingUndoReq = false;

  function setStatus(msg) {
    var gmMsg = document.getElementById('gmGameMsg');
    var connSt = document.getElementById('connStatus');
    if (gmMsg && document.getElementById('gmGame').style.display !== 'none') gmMsg.textContent = msg;
    if (connSt) connSt.textContent = msg;
  }

  function showScreen(screen) {
    var screens = [document.getElementById('gmLobby'), document.getElementById('gmRoom'), document.getElementById('gmGame')];
    screens.forEach(function(s) { if (s) s.style.display = 'none'; });
    var over = document.getElementById('gmOver');
    if (over) over.style.display = 'none';
    if (screen) screen.style.display = 'flex';
  }

  function initBoard() {
    board = [];
    for (var r = 0; r < BOARD_SIZE; r++) { board[r] = []; for (var c = 0; c < BOARD_SIZE; c++) board[r][c] = 0; }
    moveHistory = [];
    currentTurn = 1;
    gameActive = true;
    pendingUndoReq = false;
    document.getElementById('btnUndo').disabled = true;
  }

  function drawBoard() {
    var w = CELL * (BOARD_SIZE + 1);
    gmCanvas.width = w * 2;
    gmCanvas.height = w * 2;
    var cssW = Math.min(w, 400);
    gmCanvas.style.width = cssW + 'px';
    gmCanvas.style.height = cssW + 'px';
    ctx.setTransform(2, 0, 0, 2, 0, 0);

    ctx.fillStyle = '#f5d5a0';
    ctx.fillRect(0, 0, w, w);

    ctx.strokeStyle = '#8b7355';
    ctx.lineWidth = 0.8;
    for (var i = 0; i < BOARD_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(CELL, CELL + i * CELL);
      ctx.lineTo(CELL + (BOARD_SIZE - 1) * CELL, CELL + i * CELL);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(CELL + i * CELL, CELL);
      ctx.lineTo(CELL + i * CELL, CELL + (BOARD_SIZE - 1) * CELL);
      ctx.stroke();
    }

    var stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
    stars.forEach(function(p) {
      ctx.fillStyle = '#8b7355';
      ctx.beginPath();
      ctx.arc(CELL + p[1] * CELL, CELL + p[0] * CELL, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.fillStyle = '#8b7355';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i2 = 0; i2 < BOARD_SIZE; i2++) {
      ctx.fillText(String.fromCharCode(65 + i2), CELL + i2 * CELL, CELL - 14);
      ctx.fillText(i2 + 1, CELL - 20, CELL + i2 * CELL);
    }

    for (var r = 0; r < BOARD_SIZE; r++) {
      for (var c = 0; c < BOARD_SIZE; c++) {
        if (board[r][c] === 0) continue;
        var cx = CELL + c * CELL;
        var cy = CELL + r * CELL;
        var rad = CELL * 0.43;
        var grad = ctx.createRadialGradient(cx - rad * 0.3, cy - rad * 0.3, rad * 0.1, cx, cy, rad);
        if (board[r][c] === 1) { grad.addColorStop(0, '#555'); grad.addColorStop(1, '#111'); }
        else { grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#ccc'); }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = board[r][c] === 1 ? '#000' : '#bbb';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    if (moveHistory.length > 0) {
      var last = moveHistory[moveHistory.length - 1];
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(CELL + last.c * CELL, CELL + last.r * CELL, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    var turnEl = document.getElementById('turnInfo');
    if (!gameActive) { turnEl.textContent = '游戏结束'; return; }
    var myTurn = (myColor === 1 && currentTurn === 1) || (myColor === 2 && currentTurn === 2);
    turnEl.textContent = (currentTurn === 1 ? '⚫ 黑方' : '⚪ 白方') + (myTurn ? '（你的回合）' : '（对手回合）');
  }

  function placePiece(r, c) {
    if (!gameActive) return false;
    if (board[r][c] !== 0) return false;
    var myTurn = (myColor === 1 && currentTurn === 1) || (myColor === 2 && currentTurn === 2);
    if (!myTurn) return false;

    board[r][c] = currentTurn;
    moveHistory.push({ r: r, c: c, color: currentTurn });
    drawBoard();
    sendMsg({ type: 'move', r: r, c: c });
    document.getElementById('btnUndo').disabled = false;

    if (checkWin(r, c, currentTurn)) {
      gameActive = false;
      stopTimer();
      var won = (myColor === 1 && currentTurn === 1) || (myColor === 2 && currentTurn === 2);
      showGameOver(won);
      return true;
    }
    if (moveHistory.length >= BOARD_SIZE * BOARD_SIZE) {
      gameActive = false;
      stopTimer();
      showGameOver(null);
      return true;
    }
    currentTurn = currentTurn === 1 ? 2 : 1;
    drawBoard();
    return true;
  }

  function checkWin(r, c, color) {
    var dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (var d = 0; d < dirs.length; d++) {
      var dr = dirs[d][0], dc = dirs[d][1];
      var count = 1;
      for (var i = 1; i < 5; i++) {
        var nr = r + dr * i, nc = c + dc * i;
        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === color) count++;
        else break;
      }
      for (var i2 = 1; i2 < 5; i2++) {
        var nr2 = r - dr * i2, nc2 = c - dc * i2;
        if (nr2 >= 0 && nr2 < BOARD_SIZE && nc2 >= 0 && nc2 < BOARD_SIZE && board[nr2][nc2] === color) count++;
        else break;
      }
      if (count >= 5) return true;
    }
    return false;
  }

  function showGameOver(won) {
    var overEl = document.getElementById('gmOver');
    overEl.style.display = 'flex';
    var txt;
    if (won === true) txt = '🎉 你赢了！';
    else if (won === false) txt = '😢 你输了';
    else txt = '🤝 平局';
    document.getElementById('gmResultText').textContent = txt;

    var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
    var min = Math.floor(elapsed / 60), sec = elapsed % 60;
    document.getElementById('gmScoreText').textContent = '用时 ' + min + '分' + sec + '秒  |  共 ' + moveHistory.length + ' 手';
    saveHistory(won === true ? 'win' : won === false ? 'lose' : 'draw', elapsed);
  }

  function saveHistory(resultType, elapsed) {
    try {
      var records = JSON.parse(localStorage.getItem('gomoku_history') || '[]');
      records.unshift({
        date: new Date().toLocaleString('zh-CN'),
        result: resultType,
        moves: moveHistory.length,
        time: elapsed,
        opponent: conn ? conn.peer.slice(0, 8) : 'unknown'
      });
      if (records.length > 30) records = records.slice(0, 30);
      localStorage.setItem('gomoku_history', JSON.stringify(records));
      renderHistory();
    } catch(e) {}
  }

  function renderHistory() {
    var el = document.getElementById('historyList');
    try {
      var records = JSON.parse(localStorage.getItem('gomoku_history') || '[]');
      if (records.length === 0) { el.innerHTML = '暂无记录'; return; }
      el.innerHTML = records.map(function(r) {
        var icon = r.result === 'win' ? '🏆' : r.result === 'lose' ? '💔' : '🤝';
        return '<div class="gm-history-item">' + icon + ' ' + r.date + ' | ' + r.moves + '手 | ' + Math.floor(r.time/60) + '分' + r.time%60 + '秒 | 对手:' + r.opponent + '</div>';
      }).join('');
    } catch(e) { el.innerHTML = '暂无记录'; }
  }

  function requestUndo() {
    if (!gameActive || moveHistory.length < 2) return;
    if (pendingUndoReq) { setStatus('已有悔棋请求等待对方处理'); return; }
    sendMsg({ type: 'undo_req' });
    pendingUndoReq = true;
    setStatus('已发送悔棋请求，等待对方确认...');
  }

  function doUndo() {
    if (moveHistory.length < 2) return;
    moveHistory.pop();
    moveHistory.pop();
    board = [];
    for (var r = 0; r < BOARD_SIZE; r++) { board[r] = []; for (var c = 0; c < BOARD_SIZE; c++) board[r][c] = 0; }
    moveHistory.forEach(function(m) { board[m.r][m.c] = m.color; });
    currentTurn = moveHistory.length % 2 === 0 ? 1 : 2;
    pendingUndoReq = false;
    drawBoard();
    if (moveHistory.length < 2) document.getElementById('btnUndo').disabled = true;
  }

  function startTimer() {
    gameStartTime = Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      var min = Math.floor(elapsed / 60), sec = elapsed % 60;
      document.getElementById('gameTimer').textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function sendMsg(data) {
    if (conn && conn.open) { conn.send(JSON.stringify(data)); }
  }

  function setupPeer() {
    if (peer) { peer.destroy(); }
    peer = new Peer(undefined, { debug: 0 });
    peer.on('error', function(err) { setStatus('连接错误: ' + err.type); });
  }

  function setupConnection() {
    conn.on('open', function() {
      setStatus('已连接！');
      var card = document.getElementById('playerOpp');
      card.querySelector('.gm-player-name').textContent = '对手';
      card.querySelector('.gm-player-icon').textContent = '😎';
      document.getElementById('oppStatus').textContent = '未准备';
    });

    conn.on('data', function(raw) {
      var data;
      try { data = JSON.parse(raw); } catch(e) { return; }
      handleMessage(data);
    });

    conn.on('close', function() {
      setStatus('对手断开连接');
      document.getElementById('oppStatus').textContent = '已离开';
      var card = document.getElementById('playerOpp');
      card.querySelector('.gm-player-name').textContent = '等待对手...';
      card.querySelector('.gm-player-icon').textContent = '⌛';
      oppReady = false;
    });
  }

  function handleMessage(data) {
    switch (data.type) {
      case 'ready':
        oppReady = true;
        document.getElementById('oppStatus').textContent = '✅ 已准备';
        checkBothReady();
        break;
      case 'move':
        if (!gameActive) return;
        board[data.r][data.c] = currentTurn;
        moveHistory.push({ r: data.r, c: data.c, color: currentTurn });
        document.getElementById('btnUndo').disabled = false;
        if (checkWin(data.r, data.c, currentTurn)) {
          gameActive = false; stopTimer(); showGameOver(false);
        } else {
          currentTurn = currentTurn === 1 ? 2 : 1;
        }
        drawBoard();
        break;
      case 'undo_req':
        if (confirm('对手请求悔棋，是否同意？')) {
          sendMsg({ type: 'undo_res', accept: true });
          doUndo();
          setStatus('悔棋已生效');
        } else {
          sendMsg({ type: 'undo_res', accept: false });
        }
        break;
      case 'undo_res':
        if (data.accept) { doUndo(); setStatus('悔棋已生效'); }
        else { pendingUndoReq = false; setStatus('对方拒绝了悔棋'); }
        break;
      case 'resign':
        gameActive = false; stopTimer(); showGameOver(true);
        break;
      case 'rematch':
        if (confirm('对手邀请再来一局，是否接受？')) { sendMsg({ type: 'rematch_accept' }); startMatch(); }
        break;
      case 'rematch_accept':
        startMatch();
        break;
    }
  }

  function checkBothReady() {
    if (isReady && oppReady) startMatch();
  }

  function startMatch() {
    document.getElementById('gmOver').style.display = 'none';
    showScreen(document.getElementById('gmGame'));
    initBoard();
    myColor = isHost ? 1 : 2;
    drawBoard();
    startTimer();
    setStatus('');
    document.getElementById('btnUndo').disabled = true;
  }

  // ---- 按钮事件 ----
  document.getElementById('btnCreateRoom').addEventListener('click', function() {
    setupPeer();
    peer.on('open', function(id) {
      roomId = id;
      isHost = true;
      document.getElementById('roomIdText').textContent = roomId;
      showScreen(document.getElementById('gmRoom'));
      setStatus('等待对手加入...');
      document.getElementById('selfStatus').textContent = '未准备';
      document.getElementById('oppStatus').textContent = '---';
      document.getElementById('playerOpp').querySelector('.gm-player-name').textContent = '等待对手...';
      document.getElementById('playerOpp').querySelector('.gm-player-icon').textContent = '⌛';
      isReady = false; oppReady = false;
    });
    peer.on('connection', function(c) {
      if (conn) conn.close();
      conn = c;
      setupConnection();
    });
  });

  document.getElementById('btnShowJoin').addEventListener('click', function() {
    var box = document.getElementById('joinBox');
    box.style.display = box.style.display === 'none' ? 'flex' : 'none';
  });

  document.getElementById('btnJoinRoom').addEventListener('click', function() {
    var inputId = document.getElementById('inputRoomId').value.trim();
    if (!inputId) return alert('请输入房间号');
    roomId = inputId;
    isHost = false;
    setupPeer();
    peer.on('open', function() {
      conn = peer.connect(roomId, { reliable: true });
      setupConnection();
      document.getElementById('roomIdText').textContent = roomId;
      showScreen(document.getElementById('gmRoom'));
      setStatus('正在连接...');
      document.getElementById('selfStatus').textContent = '未准备';
      document.getElementById('oppStatus').textContent = '---';
      document.getElementById('playerOpp').querySelector('.gm-player-name').textContent = '等待对手...';
      document.getElementById('playerOpp').querySelector('.gm-player-icon').textContent = '⌛';
      isReady = false; oppReady = false;
    });
    document.getElementById('joinBox').style.display = 'none';
  });

  var btnInvite = document.getElementById('btnInvite');
  var invitePopup = document.getElementById('invitePopup');
  btnInvite.addEventListener('click', function(e) {
    e.stopPropagation();
    invitePopup.style.display = invitePopup.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', function(e) {
    if (!document.getElementById('inviteWrap').contains(e.target)) {
      invitePopup.style.display = 'none';
    }
  });

  document.getElementById('btnInviteWechat').addEventListener('click', function() {
    invitePopup.style.display = 'none';
    var link = window.location.origin + window.location.pathname + '?gmroom=' + roomId;
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      window.open('weixin://', '_blank');
      setStatus('💬 请在微信中粘贴链接发送给好友');
    } else {
      setStatus('💬 请复制链接后通过微信发送给好友');
    }
    navigator.clipboard.writeText(link).then(function() {
      setStatus('💬 链接已复制，请在微信中粘贴发送给好友');
    }).catch(function() {});
    setTimeout(function() {
      var el = document.getElementById('connStatus');
      if (el && el.textContent.indexOf('链接已复制') >= 0) el.textContent = '等待对手加入...';
    }, 4000);
  });

  document.getElementById('btnInviteCopy').addEventListener('click', function() {
    invitePopup.style.display = 'none';
    var link = window.location.origin + window.location.pathname + '?gmroom=' + roomId;
    navigator.clipboard.writeText(link).then(function() {
      setStatus('✅ 链接已复制！发给好友即可');
      setTimeout(function() {
        var el = document.getElementById('connStatus');
        if (el && el.textContent.indexOf('链接已复制') >= 0) el.textContent = '等待对手加入...';
      }, 3000);
    }).catch(function() { prompt('复制以下链接发给好友：', link); });
  });

  document.getElementById('btnReady').addEventListener('click', function() {
    isReady = !isReady;
    var btn = document.getElementById('btnReady');
    if (isReady) { btn.textContent = '❌ 取消准备'; document.getElementById('selfStatus').textContent = '✅ 已准备'; sendMsg({ type: 'ready' }); }
    else { btn.textContent = '✅ 准备'; document.getElementById('selfStatus').textContent = '未准备'; }
    checkBothReady();
  });

  document.getElementById('btnLeaveRoom').addEventListener('click', function() {
    if (conn) { conn.close(); conn = null; }
    if (peer) { peer.destroy(); peer = null; }
    isReady = false; oppReady = false;
    stopTimer();
    showScreen(document.getElementById('gmLobby'));
  });

  document.getElementById('btnQuitGame').addEventListener('click', function() {
    if (conn) { sendMsg({ type: 'resign' }); conn.close(); conn = null; }
    if (peer) { peer.destroy(); peer = null; }
    isReady = false; oppReady = false;
    gameActive = false; stopTimer();
    document.getElementById('gmOver').style.display = 'none';
    showScreen(document.getElementById('gmLobby'));
  });

  document.getElementById('btnUndo').addEventListener('click', requestUndo);

  document.getElementById('btnResign').addEventListener('click', function() {
    if (!gameActive) return;
    if (confirm('确定要认输吗？')) { sendMsg({ type: 'resign' }); gameActive = false; stopTimer(); showGameOver(false); }
  });

  document.getElementById('btnRematch').addEventListener('click', function() { sendMsg({ type: 'rematch' }); });

  gmCanvas.addEventListener('click', function(e) {
    if (!gameActive) return;
    var myTurn = (myColor === 1 && currentTurn === 1) || (myColor === 2 && currentTurn === 2);
    if (!myTurn) return;
    var rect = gmCanvas.getBoundingClientRect();
    var scaleX = (CELL * (BOARD_SIZE + 1)) / rect.width;
    var scaleY = (CELL * (BOARD_SIZE + 1)) / rect.height;
    var x = (e.clientX - rect.left) * scaleX;
    var y = (e.clientY - rect.top) * scaleY;
    var c = Math.round((x - CELL) / CELL);
    var r = Math.round((y - CELL) / CELL);
    if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return;
    placePiece(r, c);
  });

  // URL自动加入
  (function() {
    var params = new URLSearchParams(window.location.search);
    var autoRoom = params.get('gmroom');
    if (autoRoom) {
      document.getElementById('inputRoomId').value = autoRoom;
      document.getElementById('btnJoinRoom').click();
    }
  })();

  showScreen(document.getElementById('gmLobby'));
  initBoard();
  drawBoard();
  renderHistory();
})();
</script>
